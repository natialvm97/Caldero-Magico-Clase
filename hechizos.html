<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Playfair Display', serif;
    background: linear-gradient(135deg,#f7c6d9,#cde8d6);
    margin:0;
    padding:40px;
    transition:0.5s;
}

h1{
    text-align:center;
    color:#b85c7a;
    font-family:'Great Vibes', cursive;
    font-size:48px;
    margin-bottom:40px;
}

.catalog-section{
    margin-bottom:50px;
}

.catalog-section h4{
    color:#6fa58c;
    margin-bottom:20px;
    font-size:22px;
}

/* GRID */
.catalog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
}

/* TARJETA */
.catalog-item{
    background:white;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    overflow:hidden;
    text-align:center;
    padding-bottom:15px;
    transition:0.3s;
}

.catalog-item:hover{
    transform:scale(1.05);
}

/* IMAGEN CUADRADA */
.catalog-item img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
}

/* PRECIO */
.price{
    font-weight:bold;
    color:#b85c7a;
    margin:10px 0;
    font-size:18px;
}

/* BOTON */
.add-btn{
    background:#6fa58c;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.add-btn:hover{
    background:#4f8b74;
}

/* CARRITO */
.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.cart-total{
font-weight:bold;
margin-top:10px;
}

/* 🌙 DARK MODE */
.dark-mode{
    background:linear-gradient(135deg,#2b0036,#3d0052);
    color:white;
}

/* ✨ ESTRELLAS */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
    display:none;
}

.dark-mode .stars{
    display:block;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

</style>
</head>

<script>

function agregarAlCarrito(nombre,precio){
    alert(nombre+" agregado al carrito 🛒 - $" + precio);
}

/* ESTRELLAS */
function crearEstrellas(){
const contenedor=document.getElementById("stars");
contenedor.innerHTML="";
for(let i=0;i<80;i++){
let estrella=document.createElement("div");
estrella.classList.add("star");
estrella.style.top=Math.random()*100+"%";
estrella.style.left=Math.random()*100+"%";
estrella.style.animationDelay=Math.random()*2+"s";
contenedor.appendChild(estrella);
}
}

crearEstrellas();

</script>
