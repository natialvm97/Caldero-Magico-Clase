<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Playfair Display', serif;
    background: linear-gradient(135deg,#f7c6d9,#cde8d6);
    margin:0;
    padding:40px;
    transition:0.5s;
}

/* ✅ TITULO */
h1{
    text-align:center;
    color:#b85c7a;
    font-family:'Great Vibes', cursive;
    font-size:48px;
    margin-bottom:40px;
}

/* ✅ SECCION */
.catalog-section{
    margin-bottom:50px;
}

.catalog-section h4{
    color:#6fa58c;
    margin-bottom:20px;
    font-size:22px;
}

/* ✅ GRID CATALOGO */
.catalog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:25px;
}

/* ✅ TARJETA PRODUCTO */
.catalog-item{
    width:100%;
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:15px;
    background:white;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    cursor:pointer;
    transition:0.3s;
}

.catalog-item:hover{
    transform:scale(1.05);
}

/* ✅ IMAGEN CUADRADA */
.catalog-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* 🛒 */
.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.cart-total{
font-weight:bold;
margin-top:10px;
}

/* 🌙 MODO OSCURO */
.dark-mode{
    background:linear-gradient(135deg,#2b0036,#3d0052);
    color:white;
}

.dark-mode button{
    background:#5e2a84;
    color:white;
}

/* ✨ ESTRELLAS */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
    display:none;
}

.dark-mode .stars{
    display:block;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<h1>✨ Catálogo Mágico de Velas ✨</h1>

<!-- 🔮 VIDRIO -->
<div class="catalog-section">
<h4>Velas en recipientes de vidrio</h4>

<div class="catalog-grid">
<div class="catalog-item" onclick="agregarAlCarrito('Vidrio',10)"><img src="Vidrio.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Vidrio',10)"><img src="Vidrio 2.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Vidrio',10)"><img src="Vidrio 3.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Vidrio',10)"><img src="Vidrio 4.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Vidrio',10)"><img src="Vidrio 5.png"></div>
</div>
</div>

<!-- 🏖 ARENA -->
<div class="catalog-section">
<h4>Velas de arena</h4>

<div class="catalog-grid">
<div class="catalog-item" onclick="agregarAlCarrito('Arena',8)"><img src="Arena.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Arena',8)"><img src="Arena 2.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Arena',8)"><img src="Arena 3.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Arena',8)"><img src="Arena 4.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Arena',8)"><img src="Arena 5.png"></div>
</div>
</div>

<!-- 🕯 LARGAS -->
<div class="catalog-section">
<h4>Velas largas</h4>

<div class="catalog-grid">
<div class="catalog-item" onclick="agregarAlCarrito('Larga',12)"><img src="Larga.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Larga',12)"><img src="Larga 2.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Larga',12)"><img src="Larga 3.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Larga',12)"><img src="Larga 4.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Larga',12)"><img src="Larga 5.png"></div>
</div>
</div>

<!-- ✨ DECORATIVAS -->
<div class="catalog-section">
<h4>Velas decorativas</h4>

<div class="catalog-grid">
<div class="catalog-item" onclick="agregarAlCarrito('Decorativa',15)"><img src="Decorativa 1.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Decorativa',15)"><img src="Decorativa 2.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Decorativa',15)"><img src="Decorativa 3.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Decorativa',15)"><img src="Decorativa 4.png"></div>
<div class="catalog-item" onclick="agregarAlCarrito('Decorativa',15)"><img src="Decorativa 5.png"></div>
</div>
</div>

<script>

/* 🛒 SIMULACION CARRITO */
function agregarAlCarrito(nombre,precio){
    alert(nombre+" agregado al carrito 🛒");
}

/* ✨ ESTRELLAS */
function crearEstrellas(){
    const contenedor=document.getElementById("stars");
    contenedor.innerHTML="";
    for(let i=0;i<80;i++){
        let estrella=document.createElement("div");
        estrella.classList.add("star");
        estrella.style.top=Math.random()*100+"%";
        estrella.style.left=Math.random()*100+"%";
        estrella.style.animationDelay=Math.random()*2+"s";
        contenedor.appendChild(estrella);
    }
}

crearEstrellas();

</script>

</body>
</html>
