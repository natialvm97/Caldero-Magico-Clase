<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo | El Caldero Mágico</title>

<!-- ⚠️ NO tocamos body ni colores -->
<style>

/* ===== FILTROS (NO CAMBIA TEMA) ===== */

.filtros{
display:flex;
justify-content:center;
gap:15px;
margin:25px 0;
flex-wrap:wrap;
}

.filtros input,
.filtros select{
padding:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:inherit;
color:inherit;
font-family:inherit;
}

/* ===== GRID CATÁLOGO (solo ordena) ===== */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* mantiene tus tarjetas */
.producto img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

</style>
</head>

<body>

<h1 style="text-align:center;">✨ Catálogo de Velas ✨</h1>

<!-- ================= FILTROS ================= -->

<div class="filtros">

<input type="text" id="buscador" placeholder="Buscar vela...">

<select id="filtroCategoria">
<option value="todos">Todas las categorías</option>
<option value="vidrio">Velas en recipientes de vidrio</option>
<option value="arena">Velas de arena</option>
<option value="largas">Velas largas</option>
<option value="decorativas">Velas decorativas</option>
</select>

<select id="filtroPrecio">
<option value="todos">Todos los precios</option>
<option value="20">Menor o igual a $20</option>
<option value="25">Menor o igual a $25</option>
<option value="30">Menor o igual a $30</option>
</select>

</div>

<!-- ================= CATÁLOGO ================= -->

<div class="catalogo">

<!-- 🔥 SOLO CAMBIAMOS ESTO: agregamos data-* -->

<!-- Velas en recipiente de vidrio -->
<div class="producto"
data-nombre="Vela en recipiente de vidrio"
data-categoria="vidrio"
data-precio="20">

<img src="imagenes/vidrio1.jpg">
<h3>Vela en recipiente de vidrio</h3>
<p>$20</p>

</div>

<!-- Velas de arena -->
<div class="producto"
data-nombre="Vela de arena"
data-categoria="arena"
data-precio="25">

<img src="imagenes/arena1.jpg">
<h3>Vela de arena</h3>
<p>$25</p>

</div>

<!-- Velas largas -->
<div class="producto"
data-nombre="Vela larga"
data-categoria="largas"
data-precio="15">

<img src="imagenes/larga1.jpg">
<h3>Vela larga</h3>
<p>$15</p>

</div>

<!-- Velas decorativas -->
<div class="producto"
data-nombre="Vela decorativa"
data-categoria="decorativas"
data-precio="30">

<img src="imagenes/decorativa1.jpg">
<h3>Vela decorativa</h3>
<p>$30</p>

</div>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

const buscador=document.getElementById("buscador");
const filtroCategoria=document.getElementById("filtroCategoria");
const filtroPrecio=document.getElementById("filtroPrecio");

const productos=document.querySelectorAll(".producto");

function filtrarProductos(){

const texto=buscador.value.toLowerCase();
const categoria=filtroCategoria.value;
const precio=filtroPrecio.value;

productos.forEach(producto=>{

const nombre=producto.dataset.nombre.toLowerCase();
const categoriaProducto=producto.dataset.categoria;
const precioProducto=parseFloat(producto.dataset.precio);

const textoOK=nombre.includes(texto);

const categoriaOK=
categoria==="todos"||
categoriaProducto===categoria;

const precioOK=
precio==="todos"||
precioProducto<=precio;

producto.style.display=
(textoOK&&categoriaOK&&precioOK)?"":"none";

});

}

buscador.addEventListener("input",filtrarProductos);
filtroCategoria.addEventListener("change",filtrarProductos);
filtroPrecio.addEventListener("change",filtrarProductos);

</script>

</body>
</html>
