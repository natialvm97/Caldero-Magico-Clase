<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

body{
    font-family:Poppins;
    background:#111;
    color:white;
    margin:0;
}

/* ===== CONTROLES ===== */

.controles{
    text-align:center;
    padding:20px;
}

input,select,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button{
    cursor:pointer;
}

/* ===== GRID ===== */

.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.producto{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}

.producto:hover{
    transform:scale(1.03);
}

.producto img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

.precio{
    font-size:18px;
    color:#ffd369;
    margin:10px 0;
}

</style>
</head>

<body>

<h1 style="text-align:center;">Explorar Hechizos</h1>

<!-- ================= CONTROLES ================= -->

<div class="controles">

<input type="text" id="buscador" placeholder="Buscar producto...">

<select id="categoriaFiltro">
<option value="todos">Todas las categorías</option>
<option value="vidrio">Velas en Recipiente</option>
<option value="arena">Velas de Arena</option>
<option value="largas">Velas Largas</option>
<option value="decorativas">Velas Decorativas</option>
</select>

<br>

<button onclick="filtrarPrecio(20)">Menor a $20</button>
<button onclick="filtrarPrecio(25)">Menor a $25</button>
<button onclick="filtrarPrecio(30)">Menor a $30</button>
<button onclick="filtrarPrecio(999)">Todos</button>

</div>

<!-- ================= CATALOGO ================= -->

<div class="catalogo" id="catalogo">

<!-- 🔥 IMPORTANTE -->
<!-- USÉ LOS MISMOS NOMBRES DE ARCHIVOS -->

<div class="producto" data-nombre="Vela Luna" data-categoria="vidrio" data-precio="20">
<img src="vela1.jpg">
<h3>Vela Luna</h3>
<p class="precio">$20</p>
</div>

<div class="producto" data-nombre="Vela Solar" data-categoria="vidrio" data-precio="20">
<img src="vela2.jpg">
<h3>Vela Solar</h3>
<p class="precio">$20</p>
</div>

<div class="producto" data-nombre="Vela Arena Mística" data-categoria="arena" data-precio="25">
<img src="arena1.jpg">
<h3>Vela Arena Mística</h3>
<p class="precio">$25</p>
</div>

<div class="producto" data-nombre="Vela Arena Ritual" data-categoria="arena" data-precio="25">
<img src="arena2.jpg">
<h3>Vela Arena Ritual</h3>
<p class="precio">$25</p>
</div>

<div class="producto" data-nombre="Vela Larga Blanca" data-categoria="largas" data-precio="15">
<img src="larga1.jpg">
<h3>Vela Larga Blanca</h3>
<p class="precio">$15</p>
</div>

<div class="producto" data-nombre="Vela Larga Negra" data-categoria="largas" data-precio="15">
<img src="larga2.jpg">
<h3>Vela Larga Negra</h3>
<p class="precio">$15</p>
</div>

<div class="producto" data-nombre="Vela Decorativa Dragón" data-categoria="decorativas" data-precio="30">
<img src="decorativa1.jpg">
<h3>Vela Decorativa Dragón</h3>
<p class="precio">$30</p>
</div>

<div class="producto" data-nombre="Vela Decorativa Bruja" data-categoria="decorativas" data-precio="30">
<img src="decorativa2.jpg">
<h3>Vela Decorativa Bruja</h3>
<p class="precio">$30</p>
</div>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

const buscador=document.getElementById("buscador");
const categoriaFiltro=document.getElementById("categoriaFiltro");

let precioMax=999;

buscador.addEventListener("input",filtrar);
categoriaFiltro.addEventListener("change",filtrar);

function filtrarPrecio(valor){
    precioMax=valor;
    filtrar();
}

function filtrar(){

const texto=buscador.value.toLowerCase();
const categoria=categoriaFiltro.value;

document.querySelectorAll(".producto").forEach(producto=>{

const nombre=producto.dataset.nombre.toLowerCase();
const cat=producto.dataset.categoria;
const precio=parseFloat(producto.dataset.precio);

let mostrar=true;

/* BUSCADOR */
if(!nombre.includes(texto)) mostrar=false;

/* CATEGORIA */
if(categoria!=="todos" && cat!==categoria)
mostrar=false;

/* PRECIO */
if(precio>precioMax)
mostrar=false;

producto.style.display=mostrar?"block":"none";

});

}

</script>

</body>
</html>
