<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo | El Caldero Mágico</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
}

h1{
text-align:center;
margin:30px;
}

/* ===== FILTROS ===== */

.filtros{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

.filtros input,
.filtros select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

/* ===== GRID ===== */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
}

/* ===== PRODUCTO ===== */

.producto{
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
transition:.3s;
}

.producto:hover{
transform:scale(1.05);
}

.producto img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.precio{
font-weight:bold;
margin:10px 0;
}

</style>
</head>

<body>

<h1>✨ Catálogo de Velas ✨</h1>

<!-- ===== FILTROS ===== -->

<div class="filtros">

<input type="text" id="buscador" placeholder="Buscar producto...">

<select id="filtroCategoria">
<option value="todos">Todas las categorías</option>
<option value="vidrio">Velas en Vidrio</option>
<option value="arena">Velas de Arena</option>
<option value="largas">Velas Largas</option>
<option value="decorativas">Velas Decorativas</option>
</select>

<select id="filtroPrecio">
<option value="todos">Todos los precios</option>
<option value="20">Menor o igual a $20</option>
<option value="25">Menor o igual a $25</option>
<option value="30">Menor o igual a $30</option>
</select>

</div>

<!-- ===== CATÁLOGO ===== -->

<div class="catalogo">

<!-- VIDRIO -->
<div class="producto" data-nombre="Vela Lavanda" data-categoria="vidrio" data-precio="20">
<img src="https://picsum.photos/300?1">
<h3>Vela Lavanda</h3>
<p class="precio">$20</p>
</div>

<div class="producto" data-nombre="Vela Vainilla" data-categoria="vidrio" data-precio="20">
<img src="https://picsum.photos/300?2">
<h3>Vela Vainilla</h3>
<p class="precio">$20</p>
</div>

<!-- ARENA -->
<div class="producto" data-nombre="Vela Arena Zen" data-categoria="arena" data-precio="25">
<img src="https://picsum.photos/300?3">
<h3>Vela Arena Zen</h3>
<p class="precio">$25</p>
</div>

<div class="producto" data-nombre="Vela Arena Floral" data-categoria="arena" data-precio="25">
<img src="https://picsum.photos/300?4">
<h3>Vela Arena Floral</h3>
<p class="precio">$25</p>
</div>

<!-- LARGAS -->
<div class="producto" data-nombre="Vela Larga Blanca" data-categoria="largas" data-precio="15">
<img src="https://picsum.photos/300?5">
<h3>Vela Larga Blanca</h3>
<p class="precio">$15</p>
</div>

<div class="producto" data-nombre="Vela Larga Roja" data-categoria="largas" data-precio="15">
<img src="https://picsum.photos/300?6">
<h3>Vela Larga Roja</h3>
<p class="precio">$15</p>
</div>

<!-- DECORATIVAS -->
<div class="producto" data-nombre="Vela Luna" data-categoria="decorativas" data-precio="30">
<img src="https://picsum.photos/300?7">
<h3>Vela Luna</h3>
<p class="precio">$30</p>
</div>

<div class="producto" data-nombre="Vela Dragón" data-categoria="decorativas" data-precio="30">
<img src="https://picsum.photos/300?8">
<h3>Vela Dragón</h3>
<p class="precio">$30</p>
</div>

</div>

<!-- ===== JAVASCRIPT FILTRADO DINÁMICO ===== -->

<script>

const buscador = document.getElementById("buscador");
const filtroCategoria = document.getElementById("filtroCategoria");
const filtroPrecio = document.getElementById("filtroPrecio");

const productos = document.querySelectorAll(".producto");

function filtrarProductos(){

const texto = buscador.value.toLowerCase();
const categoria = filtroCategoria.value;
const precio = filtroPrecio.value;

productos.forEach(producto=>{

const nombre = producto.dataset.nombre.toLowerCase();
const categoriaProducto = producto.dataset.categoria;
const precioProducto = parseFloat(producto.dataset.precio);

const coincideTexto = nombre.includes(texto);
const coincideCategoria =
categoria === "todos" || categoriaProducto === categoria;
const coincidePrecio =
precio === "todos" || precioProducto <= precio;

if(coincideTexto && coincideCategoria && coincidePrecio){
producto.style.display = "";
}else{
producto.style.display = "none";
}

});

}

buscador.addEventListener("input", filtrarProductos);
filtroCategoria.addEventListener("change", filtrarProductos);
filtroPrecio.addEventListener("change", filtrarProductos);

</script>

</body>
</html>
