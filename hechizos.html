<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
font-family:'Playfair Display', serif;
background: linear-gradient(135deg,#f7c6d9,#cde8d6);
margin:0;
padding:40px;
transition:0.5s;
}

/* ===== BOTONES AGREGADOS (NO CAMBIA DISEÑO) ===== */
.moon-btn,.cart-btn{
position:fixed;
top:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}
.moon-btn{ right:20px; }
.cart-btn{ right:95px; }
/* =============================================== */

h1{
text-align:center;
color:#b85c7a;
font-family:'Great Vibes', cursive;
font-size:48px;
margin-bottom:40px;
}

.filtros{text-align:center;margin-bottom:40px;}

.catalog-section{margin-bottom:50px;}

.catalog-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.catalog-item{
background:white;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
overflow:hidden;
text-align:center;
padding-bottom:15px;
transition:0.3s;
}

.catalog-item:hover{transform:scale(1.05);}

.catalog-item img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.price{font-weight:bold;color:#b85c7a;margin:10px 0;}

.add-btn{
background:#6fa58c;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

.dark-mode{
background:linear-gradient(135deg,#2b0036,#3d0052);
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
display:none;
}

.dark-mode .stars{display:block;}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- BOTONES AGREGADOS -->
<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="irAlCarrito()">🛒</button>

<h1>✨ Catálogo Mágico de Velas ✨</h1>
