<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Playfair Display', serif;
    background: linear-gradient(135deg,#f7c6d9,#cde8d6);
    margin:0;
    padding:40px;
    transition:0.5s;
}

h1{
    text-align:center;
    color:#b85c7a;
    font-family:'Great Vibes', cursive;
    font-size:48px;
    margin-bottom:40px;
}

.filtros{
text-align:center;
margin-bottom:40px;
}

.filtros input,
.filtros select,
.filtros button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
font-family:'Playfair Display';
}

.catalog-section{
    margin-bottom:50px;
}

.catalog-section h4{
    color:#6fa58c;
    margin-bottom:20px;
    font-size:22px;
}

.catalog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
}

.catalog-item{
    background:white;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    overflow:hidden;
    text-align:center;
    padding-bottom:15px;
    transition:0.3s;
}

.catalog-item:hover{
    transform:scale(1.05);
}

.catalog-item img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
}

.price{
    font-weight:bold;
    color:#b85c7a;
    margin:10px 0;
    font-size:18px;
}

.add-btn{
    background:#6fa58c;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.add-btn:hover{
    background:#4f8b74;
}

.dark-mode{
    background:linear-gradient(135deg,#2b0036,#3d0052);
    color:white;
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
    display:none;
}

.dark-mode .stars{
    display:block;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* BOTONES INDEX */

.moon-btn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}

.cart-btn{
position:fixed;
top:20px;
right:95px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
font-family:'Playfair Display',serif;
}

</style>
</head>

<body>

<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="irCarrito()">🛒</button>

<div class="stars" id="stars"></div>

<h1>✨ Catálogo Mágico de Velas ✨</h1>

<div class="filtros">

<input type="text" id="buscador" placeholder="Buscar vela...">

<select id="categoriaFiltro">
<option value="todas">Todas las categorías</option>
<option value="vidrio">Vidrio</option>
<option value="arena">Arena</option>
<option value="larga">Larga</option>
<option value="decorativa">Decorativa</option>
</select>

<br>

<button onclick="filtrarPrecio(20)">Menor a $20</button>
<button onclick="filtrarPrecio(25)">Menor a $25</button>
<button onclick="filtrarPrecio(30)">Menor a $30</button>
<button onclick="filtrarPrecio(999)">Todas</button>

</div>

<!-- VIDRIO -->
<div class="catalog-section">
<h4>Velas en recipientes de vidrio</h4>
<div class="catalog-grid">

<div class="catalog-item" data-categoria="vidrio" data-precio="20"><img src="Vidrio.png"><div class="price">$20</div><button class="add-btn" onclick="agregarAlCarrito('Vela de Vidrio',20)">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="vidrio" data-precio="20"><img src="Vidrio 2.png"><div class="price">$20</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="vidrio" data-precio="20"><img src="Vidrio 3.png"><div class="price">$20</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="vidrio" data-precio="20"><img src="Vidrio 4.png"><div class="price">$20</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="vidrio" data-precio="20"><img src="Vidrio 5.png"><div class="price">$20</div><button class="add-btn">Agregar al carrito</button></div>

</div>
</div>

<!-- ARENA -->
<div class="catalog-section">
<h4>Velas de arena</h4>
<div class="catalog-grid">

<div class="catalog-item" data-categoria="arena" data-precio="25"><img src="Arena.png"><div class="price">$25</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="arena" data-precio="25"><img src="Arena 2.png"><div class="price">$25</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="arena" data-precio="25"><img src="Arena 3.png"><div class="price">$25</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="arena" data-precio="25"><img src="Arena 4.png"><div class="price">$25</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="arena" data-precio="25"><img src="Arena 5.png"><div class="price">$25</div><button class="add-btn">Agregar al carrito</button></div>

</div>
</div>

<!-- LARGAS -->
<div class="catalog-section">
<h4>Velas largas</h4>
<div class="catalog-grid">

<div class="catalog-item" data-categoria="larga" data-precio="15"><img src="Larga.png"><div class="price">$15</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="larga" data-precio="15"><img src="Larga 2.png"><div class="price">$15</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="larga" data-precio="15"><img src="Larga 3.png"><div class="price">$15</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="larga" data-precio="15"><img src="Larga 4.png"><div class="price">$15</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="larga" data-precio="15"><img src="Larga 5.png"><div class="price">$15</div><button class="add-btn">Agregar al carrito</button></div>

</div>
</div>

<!-- DECORATIVAS -->
<div class="catalog-section">
<h4>Velas decorativas</h4>
<div class="catalog-grid">

<div class="catalog-item" data-categoria="decorativa" data-precio="30"><img src="Decorativa 1.png"><div class="price">$30</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="decorativa" data-precio="30"><img src="Decorativa 2.png"><div class="price">$30</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="decorativa" data-precio="30"><img src="Decorativa 3.png"><div class="price">$30</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="decorativa" data-precio="30"><img src="Decorativa 4.png"><div class="price">$30</div><button class="add-btn">Agregar al carrito</button></div>
<div class="catalog-item" data-categoria="decorativa" data-precio="30"><img src="Decorativa 5.png"><div class="price">$30</div><button class="add-btn">Agregar al carrito</button></div>

</div>
</div>

<script>

/* FILTROS */

const buscador=document.getElementById("buscador");
const categoriaFiltro=document.getElementById("categoriaFiltro");

let precioMax=999;

buscador.addEventListener("input",filtrar);
categoriaFiltro.addEventListener("change",filtrar);

function filtrarPrecio(valor){
precioMax=valor;
filtrar();
}

function filtrar(){

const texto=buscador.value.toLowerCase();
const categoria=categoriaFiltro.value;

document.querySelectorAll(".catalog-item").forEach(item=>{

const cat=item.dataset.categoria;
const precio=parseFloat(item.dataset.precio);

let visible=true;

if(categoria!=="todas" && cat!==categoria) visible=false;
if(precio>precioMax) visible=false;

const nombreImg=item.querySelector("img").src.toLowerCase();
if(!nombreImg.includes(texto)) visible=false;

item.style.display=visible?"block":"none";

});

}

/* CARRITO */

function agregarAlCarrito(nombre,precio){

let carrito = JSON.parse(localStorage.getItem("carritoMagico")) || [];

carrito.push({nombre,precio});

localStorage.setItem("carritoMagico",JSON.stringify(carrito));

alert(" Agregado al carrito! 🛒");

}

/* ⭐ FIX BOTONES — ONLY ADDITION */

document.querySelectorAll(".catalog-item").forEach(item=>{

const boton=item.querySelector(".add-btn");

if(!boton.getAttribute("onclick")){

const precio=parseFloat(item.dataset.precio);
const nombre=item.querySelector("img").src.split("/").pop().replace(".png","");

boton.onclick=function(){
agregarAlCarrito(nombre,precio);
};

}

});

/* ESTRELLAS */

function crearEstrellas(){
const contenedor=document.getElementById("stars");
contenedor.innerHTML="";
for(let i=0;i<80;i++){
let estrella=document.createElement("div");
estrella.classList.add("star");
estrella.style.top=Math.random()*100+"%";
estrella.style.left=Math.random()*100+"%";
estrella.style.animationDelay=Math.random()*2+"s";
contenedor.appendChild(estrella);
}
}

crearEstrellas();

<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="irCarrito()">🛒</button>

</script>

</body>
</html>
