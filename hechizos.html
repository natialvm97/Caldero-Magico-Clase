<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#fff;
color:#111;
transition:.3s;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#111;
color:white;
}

header h1{
font-family:"Playfair Display";
margin:0;
}

/* BOTONES SUPERIORES */

.top-buttons{
display:flex;
gap:10px;
}

.top-buttons button{
padding:8px 14px;
border:none;
cursor:pointer;
border-radius:6px;
}

/* ===== GRID CATALOGO ===== */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.catalog-item{
border:1px solid #ddd;
padding:15px;
text-align:center;
border-radius:10px;
}

.catalog-item img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.add-btn{
margin-top:10px;
padding:10px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:6px;
}

/* ===== MODO OSCURO ===== */

.dark{
background:#111;
color:white;
}

.dark .catalog-item{
border-color:#444;
}

.dark header{
background:#000;
}

</style>
</head>

<body>

<header>
<h1>El Caldero Mágico</h1>

<div class="top-buttons">

<!-- ✅ BOTON CARRITO -->
<button onclick="irCarrito()">🛒 Carrito (<span id="contadorCarrito">0</span>)</button>

<!-- ✅ BOTON DARK MODE -->
<button onclick="toggleDark()">🌙 Modo Oscuro</button>

</div>
</header>

<!-- ================= CATALOGO ================= -->

<section class="catalogo">

<!-- VELA VIDRIO -->
<div class="catalog-item" data-categoria="Vidrio" data-precio="20">
<img src="img/vidrio1.jpg">
<p>Vela de Vidrio</p>
<p>$20</p>
<button class="add-btn">Agregar al carrito</button>
</div>

<!-- VELA ARENA -->
<div class="catalog-item" data-categoria="Arena" data-precio="25">
<img src="img/arena1.jpg">
<p>Vela de Arena</p>
<p>$25</p>
<button class="add-btn">Agregar al carrito</button>
</div>

<!-- VELA LARGA -->
<div class="catalog-item" data-categoria="Larga" data-precio="15">
<img src="img/larga1.jpg">
<p>Vela Larga</p>
<p>$15</p>
<button class="add-btn">Agregar al carrito</button>
</div>

<!-- VELA DECORATIVA -->
<div class="catalog-item" data-categoria="Decorativa" data-precio="30">
<img src="img/decorativa1.jpg">
<p>Vela Decorativa</p>
<p>$30</p>
<button class="add-btn">Agregar al carrito</button>
</div>

</section>

<!-- ================= SCRIPT ================= -->

<script>

/* ===== IR AL CARRITO ===== */
function irCarrito(){
window.location.href="index.html#carrito";
}

/* ===== CONTADOR CARRITO ===== */

function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

actualizarContador();

/* ===== CONECTAR TODAS LAS VELAS ===== */

document.querySelectorAll(".catalog-item").forEach(item=>{

const boton=item.querySelector(".add-btn");

const precio=parseFloat(item.dataset.precio);
const categoria=item.dataset.categoria;
const nombre="Vela "+categoria;

boton.addEventListener("click",()=>{

let carrito=JSON.parse(localStorage.getItem("carrito"))||[];

carrito.push({
nombre:nombre,
precio:precio
});

localStorage.setItem("carrito",JSON.stringify(carrito));

actualizarContador();

alert(nombre+" agregado al carrito 🛒");

});

});

/* ===== MODO OSCURO ===== */

function toggleDark(){

document.body.classList.toggle("dark");

localStorage.setItem(
"darkmode",
document.body.classList.contains("dark")
);

}

/* mantener modo oscuro */
if(localStorage.getItem("darkmode")=="true"){
document.body.classList.add("dark");
}

</script>

</body>
</html>
