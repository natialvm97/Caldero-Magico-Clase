<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* TODO TU CSS ORIGINAL — NO CAMBIADO */

body{
font-family:'Playfair Display', serif;
background: linear-gradient(135deg,#f7c6d9,#cde8d6);
margin:0;
padding:40px;
}

h1{
text-align:center;
color:#b85c7a;
font-family:'Great Vibes', cursive;
font-size:48px;
margin-bottom:40px;
}

.catalog-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.catalog-item{
background:white;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
overflow:hidden;
text-align:center;
padding-bottom:15px;
}

.catalog-item img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.price{
font-weight:bold;
color:#b85c7a;
margin:10px 0;
}

.add-btn{
background:#6fa58c;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>✨ Catálogo Mágico de Velas ✨</h1>

<div class="catalog-grid">

<div class="catalog-item">
<img src="Vidrio.png">
<div class="price">$20</div>
<button class="add-btn"
onclick="agregarAlCarrito('Vela de Vidrio',20)">
Agregar al carrito
</button>
</div>

<div class="catalog-item">
<img src="Arena.png">
<div class="price">$25</div>
<button class="add-btn"
onclick="agregarAlCarrito('Vela Arena',25)">
Agregar al carrito
</button>
</div>

<div class="catalog-item">
<img src="Larga.png">
<div class="price">$15</div>
<button class="add-btn"
onclick="agregarAlCarrito('Vela Larga',15)">
Agregar al carrito
</button>
</div>

<div class="catalog-item">
<img src="Decorativa 1.png">
<div class="price">$30</div>
<button class="add-btn"
onclick="agregarAlCarrito('Vela Decorativa',30)">
Agregar al carrito
</button>
</div>

</div>

<script>

/* =============================
   🛒 CONEXIÓN REAL CON INDEX
============================= */

function agregarAlCarrito(nombre,precio){

let carrito =
JSON.parse(localStorage.getItem("carrito")) || [];

carrito.push({nombre,precio});

localStorage.setItem(
"carrito",
JSON.stringify(carrito)
);

alert(nombre+" agregado al carrito 🛒");
}

</script>

</body>
</html>
