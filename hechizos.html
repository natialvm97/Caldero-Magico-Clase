<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorar Hechizos | El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Playfair Display', serif;
    background: linear-gradient(135deg,#f7c6d9,#cde8d6);
    margin:0;
    padding:40px;
    transition:0.5s;
}

h1{
    text-align:center;
    color:#b85c7a;
    font-family:'Great Vibes', cursive;
    font-size:48px;
    margin-bottom:40px;
}

.card{
    background:rgba(255,255,255,0.9);
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.5s;
}

button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:25px;
    background:#cde8d6;
    color:#4f7f6a;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#f7c6d9;
    color:#9c4f6a;
}

.resultado{
    margin-top:10px;
    font-weight:bold;
    color:#6fa58c;
}
    .catalog-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:20px;
}

.catalog-grid img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.catalog-section h4{
margin-top:20px;
color:#6fa58c;
}

/* 🛒 */
.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.cart-total{
font-weight:bold;
margin-top:10px;
}


/* 🌙 MODO OSCURO */
.dark-mode{
    background:linear-gradient(135deg,#2b0036,#3d0052);
    color:white;
}

.dark-mode .card{
    background:rgba(60,0,80,0.85);
}

.dark-mode button{
    background:#5e2a84;
    color:white;
}

/* ✨ ESTRELLAS */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
    display:none;
}

.dark-mode .stars{
    display:block;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<h1>✨ Catálogo Mágico de Velas ✨</h1>

<!-- 7 -->
<div class="card">
<h3>7️⃣ Cambiar Tema</h3>
<button onclick="temaOscuro()">Activar / Desactivar Modo Oscuro</button>
</div>
<div class="catalog-section">
<h4>Velas en recipientes de vidrio</h4>
<div class="catalog-grid">
<img src="Vidrio.png" onclick="agregarAlCarrito('Vidrio',10)">
<img src="Vidrio 2.png" onclick="agregarAlCarrito('Vidrio',10)">
<img src="Vidrio 3.png" onclick="agregarAlCarrito('Vidrio',10)">
<img src="Vidrio 4.png" onclick="agregarAlCarrito('Vidrio',10)">
<img src="Vidrio 5.png" onclick="agregarAlCarrito('Vidrio',10)">
</div>
</div>

<div class="catalog-section">
<h4>Velas de arena</h4>
<div class="catalog-grid">
<img src="Arena.png" onclick="agregarAlCarrito('Arena',8)">
<img src="Arena 2.png" onclick="agregarAlCarrito('Arena',8)">
<img src="Arena 3.png" onclick="agregarAlCarrito('Arena',8)">
<img src="Arena 4.png" onclick="agregarAlCarrito('Arena',8)">
<img src="Arena 5.png" onclick="agregarAlCarrito('Arena',8)">
</div>
</div>

<div class="catalog-section">
<h4>Velas largas</h4>
<div class="catalog-grid">
<img src="Larga.png" onclick="agregarAlCarrito('Larga',12)">
<img src="Larga 2.png" onclick="agregarAlCarrito('Larga',12)">
<img src="Larga 3.png" onclick="agregarAlCarrito('Larga',12)">
<img src="Larga 4.png" onclick="agregarAlCarrito('Larga',12)">
<img src="Larga 5.png" onclick="agregarAlCarrito('Larga',12)">
</div>
</div>

<div class="catalog-section">
<h4>Velas decorativas</h4>
<div class="catalog-grid">
<img src="Decorativa 1.png" onclick="agregarAlCarrito('Decorativa',15)">
<img src="Decorativa 2.png" onclick="agregarAlCarrito('Decorativa',15)">
<img src="Decorativa 3.png" onclick="agregarAlCarrito('Decorativa',15)">
<img src="Decorativa 4.png" onclick="agregarAlCarrito('Decorativa',15)">
<img src="Decorativa 5.png" onclick="agregarAlCarrito('Decorativa',15)">
</div>
</div>

<div class="popup-actions">
<button onclick="closeCatalog()">Cerrar</button>
</div>

</div>
</div>


<script>

/* ✨ ESTRELLAS */
function crearEstrellas(){
    const contenedor=document.getElementById("stars");
    contenedor.innerHTML="";
    for(let i=0;i<80;i++){
        let estrella=document.createElement("div");
        estrella.classList.add("star");
        estrella.style.top=Math.random()*100+"%";
        estrella.style.left=Math.random()*100+"%";
        estrella.style.animationDelay=Math.random()*2+"s";
        contenedor.appendChild(estrella);
    }
}

/* 1 */
function registrar(){
let nombre=document.getElementById("nombre").value;
if(nombre===""){
alert("Debe ingresar nombre");
}else{
document.getElementById("res1").textContent="Estudiante "+nombre+" registrado.";
}
}

/* 2 */
function promedio(){
let a=parseFloat(document.getElementById("n1").value);
let b=parseFloat(document.getElementById("n2").value);
let c=parseFloat(document.getElementById("n3").value);
if(isNaN(a)||isNaN(b)||isNaN(c)){
alert("Ingrese las tres notas");
return;
}
let prom=(a+b+c)/3;
document.getElementById("res2").textContent="Promedio: "+prom.toFixed(2);
}

/* 3 */
function activar(){
let est=document.getElementById("estado");
est.textContent="Estado: Activo";
est.style.color="lightgreen";
}

/* 4 */
function listarCursos(){
let cursos=["Contabilidad","Finanzas","Economía","Auditoría"];
let ul=document.getElementById("lista");
ul.innerHTML="";
cursos.forEach(function(c){
let li=document.createElement("li");
li.textContent=c;
ul.appendChild(li);
});
}

/* 5 */
function duplicar(){
let notas=[60,70,80];
let nuevas=notas.map(n=>n*2);
document.getElementById("res5").textContent="Notas duplicadas: "+nuevas;
}

/* 6 */
document.getElementById("eventoBtn").addEventListener("click",function(){
alert("Matrícula confirmada correctamente");
});

/* 7 */
function temaOscuro(){
document.body.classList.toggle("dark-mode");
if(document.body.classList.contains("dark-mode")){
crearEstrellas();
}
}

/* 8 */
function validarEdad(){
let edad=parseInt(document.getElementById("edad").value);
if(isNaN(edad)){
alert("Ingrese edad");
return;
}
if(edad>=18){
document.getElementById("res8").textContent="Mayor de edad";
}else{
document.getElementById("res8").textContent="Menor de edad";
}
}

/* 9 */
let contador=0;
let intervalo;
function iniciarContador(){
if(intervalo) return;
intervalo=setInterval(function(){
contador++;
document.getElementById("contador").textContent=contador;
},1000);
}

/* 10 */
function limpiar(){
location.reload();
}

</script>

</body>
</html>
