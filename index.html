<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Caldero Mágico | Candelas Fantásticas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

.moon-btn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}

.cart-btn{
position:fixed;
top:20px;
right:95px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
font-family:'Playfair Display',serif;
}

.hero{
background-color:rgba(255,255,255,0.88);
padding:60px 80px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
max-width:900px;
transition:0.5s;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:64px;
color:#b85c7a;
margin-bottom:10px;
}

.hero h2{
font-size:24px;
font-style:italic;
color:#6fa58c;
margin-bottom:30px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:40px;
line-height:1.6;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:40px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

button{
background-color:#cde8d6;
color:#4f7f6a;
border:none;
padding:14px 40px;
font-size:18px;
border-radius:30px;
cursor:pointer;
font-family:'Playfair Display',serif;
transition:all .3s ease;
}

button:hover{
background-color:#f7c6d9;
color:#9c4f6a;
}

.banner{
width:100%;
max-width:1100px;
display:block;
margin:40px auto;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#fff;
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
text-align:left;
}

.popup-content h3{
text-align:center;
color:#b85c7a;
margin-bottom:20px;
}

.popup-content input,
.popup-content textarea,
.popup-content select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
font-family:inherit;
}

.popup-actions{
display:flex;
justify-content:space-between;
margin-top:20px;
}

</style>
</head>

<body>

<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="openCart()">🛒</button>

<section class="hero">

<h1>El Caldero Mágico</h1>

<h2>Candelas fantásticas, naturales y no tóxicas</h2>

<p>
Cada candela es una poción de luz: aromas encantados,
ceras vegetales y un brillo que transforma tu espacio
en un refugio mágico.
</p>

<img src="banner 1 v2.png" class="banner">

<div class="gallery">
<img src="photo-1720671847847-0b127f440aa3.avif">
<img src="photo-1720788810349-7e51a042404a.avif">
<img src="photo-1596433809252-260c2745dfdd.avif">
<img src="photo-1603218678692-3967d7523bb0.avif">
</div>

<div class="buttons">
<button onclick="window.location.href='hechizos.html'">Explorar hechizos</button>
<button onclick="openPopup()">Contactar por correo</button>
<button onclick="openPayment()">Pagos</button>
</div>

<img src="2.png" class="banner">

</section>

<!-- 🛒 CARRITO -->

<div class="popup" id="cartPopup">
<div class="popup-content">

<h3>Carrito de compras 🛒</h3>

<div id="cartItems"></div>

<div class="cart-total">
Total: $<span id="cartTotal">0</span>
</div>

<label>Cupón</label>
<input type="text" id="coupon">

<button onclick="applyCoupon()">Aplicar cupón</button>

<div class="popup-actions">
<button onclick="closeCart()">Cerrar</button>
</div>

</div>
</div>

<script>

/* ⭐ MODO OSCURO */
function temaOscuro(){
document.body.classList.toggle("dark-mode")
}

/* 🛒 CARRITO CONECTADO ENTRE PAGINAS */

let carrito = JSON.parse(localStorage.getItem("carrito")) || []
let descuento=0

function agregarAlCarrito(nombre,precio){
carrito.push({nombre,precio})
guardar()
renderCarrito()
}

function guardar(){
localStorage.setItem("carrito",JSON.stringify(carrito))
}

function renderCarrito(){

let cont=document.getElementById("cartItems")
cont.innerHTML=""

let total=0

carrito.forEach((item,i)=>{
total+=item.precio

cont.innerHTML+=`
<div class="cart-item">
${item.nombre} - $${item.precio}
<button onclick="eliminar(${i})">❌</button>
</div>`
})

let final=total-(total*descuento)

document.getElementById("cartTotal").innerText=
final.toFixed(2)

guardar()
}

function eliminar(i){
carrito.splice(i,1)
renderCarrito()
}

function applyCoupon(){
let c=document.getElementById("coupon").value
descuento = (c==="MAGIA10") ? 0.10 : 0
alert(descuento?"Cupón aplicado ✨":"Cupón inválido")
renderCarrito()
}

function openCart(){
renderCarrito()
document.getElementById("cartPopup").style.display="flex"
}

function closeCart(){
document.getElementById("cartPopup").style.display="none"
}

renderCarrito()

</script>

</body>
</html>
