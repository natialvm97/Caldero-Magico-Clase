<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
margin:0;
padding:0;
text-align:center;
}

/* HEADER */

header{
padding:30px;
font-family:'Great Vibes',cursive;
font-size:45px;
color:#b85c7a;
}

/* BOTONES */

a{
text-decoration:none;
}

.btn{
background:#6fa58c;
color:white;
padding:12px 20px;
border-radius:10px;
display:inline-block;
margin:10px;
cursor:pointer;
}

/* CARRITO */

.cart-icon{
position:fixed;
top:20px;
right:20px;
background:white;
padding:12px 18px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
cursor:pointer;
}

.cart-count{
background:#b85c7a;
color:white;
border-radius:50%;
padding:3px 8px;
margin-left:5px;
font-size:14px;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,.3);
padding:20px;
transition:.4s;
overflow:auto;
}

.cart.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.total{
font-weight:bold;
margin-top:20px;
}

input{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

</style>
</head>

<body>

<header>✨ El Caldero Mágico ✨</header>

<a href="hechizos.html" class="btn">Explorar Hechizos</a>

<!-- ICONO CARRITO -->
<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="contador" class="cart-count">0</span>
</div>

<!-- PANEL CARRITO -->
<div id="cart" class="cart">

<h2>Carrito</h2>

<div id="cartItems"></div>

<div class="total">
Total: $<span id="cartTotal">0</span>
</div>

<br>

<input id="codigo" placeholder="Código mágico">
<button class="btn" onclick="aplicarCodigo()">Aplicar</button>

</div>

<script>

/* ================= CARRITO GLOBAL ================= */

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let descuento = 0;

/* ================= ABRIR CARRITO ================= */

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* ================= RENDER CARRITO ================= */

function renderCarrito(){

const cont=document.getElementById("cartItems");
cont.innerHTML="";

let total=0;

carrito.forEach((item,i)=>{

total+=item.precio;

cont.innerHTML+=`
<div class="cart-item">
${item.nombre} - $${item.precio}
<button onclick="eliminar(${i})">❌</button>
</div>
`;

});

let final=total-(total*descuento);

document.getElementById("cartTotal").innerText=final.toFixed(2);
document.getElementById("contador").innerText=carrito.length;

localStorage.setItem("carrito",JSON.stringify(carrito));
}

/* ================= ELIMINAR ================= */

function eliminar(i){
carrito.splice(i,1);
renderCarrito();
}

/* ================= CODIGO DESCUENTO ================= */

function aplicarCodigo(){

const codigo=document.getElementById("codigo").value.toLowerCase();

if(codigo==="dragon"){
descuento=0.5;
alert("🔥 Descuento del Dragón activado (50%)");
}else{
descuento=0;
alert("Código inválido");
}

renderCarrito();
}

/* ================= INICIAR ================= */

renderCarrito();

</script>

</body>
</html>
