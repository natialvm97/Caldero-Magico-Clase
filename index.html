<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caldero Mágico | Candelas Fantásticas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

.moon-btn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}

.hero{
background-color:rgba(255,255,255,0.88);
padding:60px 80px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
max-width:900px;
transition:0.5s;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:64px;
color:#b85c7a;
margin-bottom:10px;
}

.hero h2{
font-size:24px;
font-style:italic;
color:#6fa58c;
margin-bottom:30px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:40px;
line-height:1.6;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:40px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

button{
background-color:#cde8d6;
color:#4f7f6a;
border:none;
padding:14px 40px;
font-size:18px;
border-radius:30px;
cursor:pointer;
font-family:'Playfair Display',serif;
transition:all .3s ease;
}

button:hover{
background-color:#f7c6d9;
color:#9c4f6a;
}

.banner{
width:100%;
max-width:1100px;
display:block;
margin:40px auto;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#fff;
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
text-align:left;
}

.popup-content h3{
text-align:center;
color:#b85c7a;
margin-bottom:20px;
}

.popup-content label{
display:block;
margin-top:10px;
font-size:14px;
}

.popup-content input,
.popup-content textarea,
.popup-content select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
font-family:inherit;
}

.popup-actions{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.catalog-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:20px;
}

.catalog-grid img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
}

.catalog-section h4{
margin-top:20px;
color:#6fa58c;
}

/* NUEVO */
.product{text-align:center;}
.product button{margin-top:5px;font-size:12px;}

.catalog-btn{position:relative;}
.catalog-count{
position:absolute;
top:-8px;
right:-8px;
background:#b85c7a;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
}

.cart-box{
background:#f9f9f9;
padding:10px;
border-radius:10px;
margin-top:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:5px;
}

.fly{
position:fixed;
width:12px;
height:12px;
background:#b85c7a;
border-radius:50%;
z-index:2000;
transition:all .8s;
}

.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<button class="moon-btn" onclick="temaOscuro()">🌙</button>

<section class="hero">

<h1>El Caldero Mágico</h1>
<h2>Candelas fantásticas, naturales y no tóxicas</h2>

<p>Texto original intacto</p>

<div class="buttons">

<button onclick="window.location.href='hechizos.html'">
Explorar hechizos
</button>

<button onclick="openCatalog()" class="catalog-btn" id="catalogBtn">
Catálogo 🛒 <span id="cartCount" class="catalog-count">0</span>
</button>

<button onclick="openPopup()">Contactar por correo</button>

<button onclick="openPayment()">Pagos</button>

</div>

</section>

<!-- CATÁLOGO -->
<div class="popup" id="catalogPopup">
<div class="popup-content" style="max-width:900px">

<h3>Catálogo de Candelas ✨</h3>

<div class="catalog-section">
<h4>Velas de arena</h4>
<div class="catalog-grid">

<div class="product">
<img src="Arena.png">
<p style="color:red;">Sin stock</p>
<button disabled>Agotado</button>
</div>

<div class="product"><img src="Arena 2.png">
<button onclick="addToCart('Arena 2',10,this)">Agregar</button></div>

<div class="product"><img src="Arena 3.png">
<button onclick="addToCart('Arena 3',12,this)">Agregar</button></div>

</div>
</div>

<div class="cart-box">
<h4>🛒 Carrito</h4>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>

<input type="text" id="coupon" placeholder="Cupón">
<button onclick="applyCoupon()">Aplicar</button>
</div>

<div class="popup-actions">
<button onclick="closeCatalog()">Cerrar</button>
</div>

</div>
</div>

<script>

let cart=[]
let discount=0

function openCatalog(){
document.getElementById('catalogPopup').style.display='flex'
}
function closeCatalog(){
document.getElementById('catalogPopup').style.display='none'
}

function addToCart(name,price,btn){
cart.push({name,price})
updateCart()
updateCounter()
animarVuelo(btn)
}

function updateCounter(){
document.getElementById("cartCount").innerText=cart.length
}

function updateCart(){
const container=document.getElementById("cartItems")
container.innerHTML=""
let total=0

cart.forEach((item,index)=>{
total+=item.price
const div=document.createElement("div")
div.classList.add("cart-item")
div.innerHTML=`
${item.name} - $${item.price}
<button onclick="removeItem(${index})">❌</button>`
container.appendChild(div)
})

let finalTotal=total-(total*discount)
document.getElementById("total").innerText=finalTotal.toFixed(2)
}

function removeItem(i){
cart.splice(i,1)
updateCart()
updateCounter()
}

function applyCoupon(){
const code=document.getElementById("coupon").value

if(code==="MAGIA10"){
discount=0.10
lanzarConfetti()
alert("Cupón aplicado ✨")
}else{
discount=0
alert("Cupón inválido")
}

updateCart()
}

function lanzarConfetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div")
c.classList.add("confetti")
c.style.left=Math.random()*100+"%"
c.style.background=`hsl(${Math.random()*360},100%,60%)`
document.body.appendChild(c)
setTimeout(()=>c.remove(),2000)
}
}

function animarVuelo(btn){
const rect=btn.getBoundingClientRect()
const cart=document.getElementById("catalogBtn").getBoundingClientRect()

const dot=document.createElement("div")
dot.classList.add("fly")
dot.style.left=rect.left+"px"
dot.style.top=rect.top+"px"

document.body.appendChild(dot)

setTimeout(()=>{
dot.style.left=cart.left+"px"
dot.style.top=cart.top+"px"
dot.style.opacity=0
},50)

setTimeout(()=>dot.remove(),800)
}

function temaOscuro(){
document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
