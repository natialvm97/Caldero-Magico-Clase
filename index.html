<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Caldero Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Playfair Display', serif;
    margin:0;
    background:#111;
    color:white;
}

/* NAV */
nav{
    background:black;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

/* GRID PRODUCTOS */
.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:30px;
}

/* TARJETA */
.producto{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

/* 🔥 ARREGLO DE TAMAÑOS */
.producto img{
    width:100%;
    aspect-ratio:1/1;       /* ← TODAS CUADRADAS */
    object-fit:cover;       /* ← no se deforman */
    border-radius:10px;
}

/* TEXTO */
.precio{
    margin-top:10px;
    font-size:18px;
}

/* BOTON */
button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    background:#d4af37;
    color:black;
    cursor:pointer;
    border-radius:8px;
}

button:hover{
    background:#f5d76e;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Inicio</a>
<a href="hechizos.html">Explorar Hechizos</a>
<a href="carrito.html">Carrito 🛒</a>
</nav>

<h1 style="text-align:center;">El Caldero Mágico</h1>

<div class="catalogo">

<div class="producto">
<img src="img/vela1.jpg">
<h3>Vela en Recipiente</h3>
<p class="precio">$20</p>
<button onclick="agregarCarrito('Vela en Recipiente',20)">Agregar al Carrito</button>
</div>

<div class="producto">
<img src="img/vela2.jpg">
<h3>Vela de Arena</h3>
<p class="precio">$25</p>
<button onclick="agregarCarrito('Vela de Arena',25)">Agregar al Carrito</button>
</div>

<div class="producto">
<img src="img/vela3.jpg">
<h3>Vela Larga</h3>
<p class="precio">$15</p>
<button onclick="agregarCarrito('Vela Larga',15)">Agregar al Carrito</button>
</div>

<div class="producto">
<img src="img/vela4.jpg">
<h3>Vela Decorativa</h3>
<p class="precio">$30</p>
<button onclick="agregarCarrito('Vela Decorativa',30)">Agregar al Carrito</button>
</div>

</div>

<script>

/* CONEXION CARRITO — NO CAMBIADA */
function agregarCarrito(nombre,precio){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

carrito.push({
nombre:nombre,
precio:precio
});

localStorage.setItem("carrito",JSON.stringify(carrito));

alert("Producto agregado al carrito 🛒");
}

</script>

</body>
</html>
