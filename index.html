<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caldero Mágico | Candelas Fantásticas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

.moon-btn, .cart-btn{
position:fixed;
top:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}

.moon-btn{ right:20px; }
.cart-btn{ right:80px; }

.hero{
background-color:rgba(255,255,255,0.88);
padding:60px 80px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
max-width:900px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:64px;
color:#b85c7a;
}

.hero h2{
font-size:24px;
color:#6fa58c;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:40px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:16px;
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

button{
background-color:#cde8d6;
color:#4f7f6a;
border:none;
padding:14px 40px;
font-size:18px;
border-radius:30px;
cursor:pointer;
}

.banner{
width:100%;
max-width:1100px;
display:block;
margin:40px auto;
border-radius:16px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#fff;
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
}

.catalog-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.catalog-grid img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.cart-total{
font-weight:bold;
margin-top:15px;
}

.dark-mode{
background:linear-gradient(135deg,#2b0036,#3d0052);
color:white;
}

.dark-mode .hero{
background:rgba(60,0,80,0.85);
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
display:none;
}

.dark-mode .stars{
display:block;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="openCart()">🛒</button>

<section class="hero">

<h1>El Caldero Mágico</h1>
<h2>Candelas fantásticas, naturales y no tóxicas</h2>

<p>Velas mágicas que iluminan tu energía ✨</p>

<div class="gallery">
<img src="photo-1720671847847-0b127f440aa3.avif">
<img src="photo-1720788810349-7e51a042404a.avif">
<img src="photo-1596433809252-260c2745dfdd.avif">
<img src="photo-1603218678692-3967d7523bb0.avif">
</div>

<div class="buttons">
<button onclick="openCatalog()">Catálogo</button>
<button onclick="openPopup()">Contacto</button>
<button onclick="openPayment()">Pagos</button>
</div>

</section>

<!-- CARRITO -->
<div class="popup" id="cartPopup">
<div class="popup-content">
<h3>Carrito 🛒</h3>

<div id="cartItems"></div>

<div class="cart-total">
Total: $<span id="cartTotal">0</span>
</div>

<input type="text" id="coupon" placeholder="Cupón">
<button onclick="applyCoupon()">Aplicar</button>

<br><br>
<button onclick="closeCart()">Cerrar</button>
</div>
</div>

<!-- CATALOGO -->
<div class="popup" id="catalogPopup">
<div class="popup-content" style="max-width:900px">

<h3>Catálogo</h3>

<div class="catalog-grid">
<img src="Vidrio.png" onclick="agregarAlCarrito('Vela vidrio',10)">
<img src="Arena.png" onclick="agregarAlCarrito('Vela arena',8)">
<img src="Larga.png" onclick="agregarAlCarrito('Vela larga',12)">
<img src="Decorativa 1.png" onclick="agregarAlCarrito('Decorativa',15)">
</div>

<button onclick="closeCatalog()">Cerrar</button>

</div>
</div>

<script>

/* 🌙 DARK */
function crearEstrellas(){
const c=document.getElementById("stars")
c.innerHTML=""
for(let i=0;i<80;i++){
let e=document.createElement("div")
e.className="star"
e.style.top=Math.random()*100+"%"
e.style.left=Math.random()*100+"%"
c.appendChild(e)
}
}

function temaOscuro(){
document.body.classList.toggle("dark-mode")
if(document.body.classList.contains("dark-mode")) crearEstrellas()
}

/* 🛒 CARRITO */
let carrito=[]
let descuento=0

function agregarAlCarrito(nombre,precio){
carrito.push({nombre,precio})
renderCarrito()
}

function renderCarrito(){
let cont=document.getElementById("cartItems")
cont.innerHTML=""
let total=0

carrito.forEach((item,i)=>{
total+=item.precio
cont.innerHTML+=`
<div class="cart-item">
${item.nombre} - $${item.precio}
<button onclick="eliminar(${i})">❌</button>
</div>`
})

let final=total-(total*descuento)
document.getElementById("cartTotal").innerText=final.toFixed(2)
}

function eliminar(i){
carrito.splice(i,1)
renderCarrito()
}

function applyCoupon(){
let c=document.getElementById("coupon").value
descuento = (c==="MAGIA10") ? 0.10 : 0
alert(descuento ? "Cupón aplicado ✨" : "Cupón inválido")
renderCarrito()
}

function openCart(){document.getElementById("cartPopup").style.display="flex"}
function closeCart(){document.getElementById("cartPopup").style.display="none"}

/* POPUPS */
function openCatalog(){document.getElementById("catalogPopup").style.display="flex"}
function closeCatalog(){document.getElementById("catalogPopup").style.display="none"}

</script>

</body>
</html>
