<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caldero Mágico | Candelas Fantásticas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* === TU CSS ORIGINAL === */
body{
margin:0;
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

/* === NUEVO === */
.product{text-align:center;}
.product button{margin-top:5px;font-size:12px;}

.catalog-btn{position:relative;}
.catalog-count{
position:absolute;
top:-8px;
right:-8px;
background:#b85c7a;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
}

.cart-box{
background:#f9f9f9;
padding:10px;
border-radius:10px;
margin-top:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:5px;
}

/* ANIMACIÓN */
.fly{
position:fixed;
width:12px;
height:12px;
background:#b85c7a;
border-radius:50%;
z-index:2000;
transition:all .8s;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<section class="hero">
<h1>El Caldero Mágico</h1>

<div class="buttons">
<button onclick="openCatalog()" class="catalog-btn" id="catalogBtn">
Catálogo 🛒 <span id="cartCount" class="catalog-count">0</span>
</button>
</div>
</section>

<!-- CATÁLOGO -->
<div class="popup" id="catalogPopup">
<div class="popup-content" style="max-width:900px">

<h3>Catálogo de Candelas ✨</h3>

<!-- VIDRIO -->
<div class="catalog-section">
<h4>Velas en recipientes de vidrio</h4>
<div class="catalog-grid">

<div class="product"><img src="Vidrio.png">
<button onclick="addToCart('Vidrio 1',15,this)">Agregar</button></div>

<div class="product"><img src="Vidrio 2.png">
<button onclick="addToCart('Vidrio 2',15,this)">Agregar</button></div>

<div class="product"><img src="Vidrio 3.png">
<button onclick="addToCart('Vidrio 3',15,this)">Agregar</button></div>

<div class="product"><img src="Vidrio 4.png">
<button onclick="addToCart('Vidrio 4',15,this)">Agregar</button></div>

<div class="product"><img src="Vidrio 5.png">
<button onclick="addToCart('Vidrio 5',15,this)">Agregar</button></div>

</div>
</div>

<!-- ARENA -->
<div class="catalog-section">
<h4>Velas de arena</h4>
<div class="catalog-grid">

<div class="product">
<img src="Arena.png">
<p style="color:red;">Sin stock</p>
<button disabled>Agotado</button>
</div>

<div class="product"><img src="Arena 2.png">
<button onclick="addToCart('Arena 2',10,this)">Agregar</button></div>

<div class="product"><img src="Arena 3.png">
<button onclick="addToCart('Arena 3',12,this)">Agregar</button></div>

<div class="product"><img src="Arena 4.png">
<button onclick="addToCart('Arena 4',11,this)">Agregar</button></div>

<div class="product"><img src="Arena 5.png">
<button onclick="addToCart('Arena 5',13,this)">Agregar</button></div>

</div>
</div>

<!-- CARRITO -->
<div class="cart-box">
<h4>🛒 Carrito</h4>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>

<input type="text" id="coupon" placeholder="Cupón">
<button onclick="applyCoupon()">Aplicar</button>
</div>

<div class="popup-actions">
<button onclick="closeCatalog()">Cerrar</button>
</div>

</div>
</div>

<script>

let cart=[]
let discount=0

function openCatalog(){
document.getElementById('catalogPopup').style.display='flex'
}
function closeCatalog(){
document.getElementById('catalogPopup').style.display='none'
}

function addToCart(name,price,btn){
cart.push({name,price})
updateCart()
updateCounter()
animarVuelo(btn)
}

function updateCounter(){
document.getElementById("cartCount").innerText=cart.length
}

function updateCart(){
const container=document.getElementById("cartItems")
container.innerHTML=""

let total=0

cart.forEach((item,index)=>{
total+=item.price
const div=document.createElement("div")
div.classList.add("cart-item")
div.innerHTML=`
${item.name} - $${item.price}
<button onclick="removeItem(${index})">❌</button>`
container.appendChild(div)
})

let finalTotal=total-(total*discount)
document.getElementById("total").innerText=finalTotal.toFixed(2)
}

function removeItem(i){
cart.splice(i,1)
updateCart()
updateCounter()
}

function applyCoupon(){
const code=document.getElementById("coupon").value

if(code==="MAGIA10"){
discount=0.10
lanzarConfetti()
alert("Cupón aplicado ✨")
}else{
discount=0
alert("Cupón inválido")
}

updateCart()
}

/* CONFETTI */
function lanzarConfetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div")
c.classList.add("confetti")
c.style.left=Math.random()*100+"%"
c.style.background=`hsl(${Math.random()*360},100%,60%)`
document.body.appendChild(c)
setTimeout(()=>c.remove(),2000)
}
}

/* VUELO */
function animarVuelo(btn){
const rect=btn.getBoundingClientRect()
const cart=document.getElementById("catalogBtn").getBoundingClientRect()

const dot=document.createElement("div")
dot.classList.add("fly")
dot.style.left=rect.left+"px"
dot.style.top=rect.top+"px"

document.body.appendChild(dot)

setTimeout(()=>{
dot.style.left=cart.left+"px"
dot.style.top=cart.top+"px"
dot.style.opacity=0
},50)

setTimeout(()=>dot.remove(),800)
}

</script>

</body>
</html>
