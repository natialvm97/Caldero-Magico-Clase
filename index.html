<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caldero Mágico</title>

<style>

body{
margin:0;
font-family:serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
}

/* BOTONES */
button{
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

/* CONTADOR CARRITO */
#cartBtn{
position:relative;
}

#cartCount{
position:absolute;
top:-8px;
right:-8px;
background:red;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}

/* PRODUCTOS */
.product{
text-align:center;
margin:10px;
}
.product button{
margin-top:5px;
}

/* CARRITO */
#cartItems div{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

/* POPUPS */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
opacity:0.8;
animation:fall 2s linear forwards;
z-index:2000;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0deg);opacity:1;}
100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* ANIMACIÓN VUELA AL CARRITO */
.fly{
position:fixed;
width:20px;
height:20px;
background:gold;
border-radius:50%;
z-index:2000;
pointer-events:none;
transition:all 0.8s ease-in-out;
}

</style>
</head>

<body>

<h1 style="text-align:center;">El Caldero Mágico ✨</h1>

<div style="text-align:center;">
<button onclick="openCatalog()">Catálogo</button>

<button id="cartBtn" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</button>
</div>

<!-- CATÁLOGO -->
<div class="popup" id="catalogPopup">
<div class="popup-content">

<h3>Catálogo</h3>

<h4>Velas de arena</h4>

<div class="product">
<p>Arena 1</p>
<p style="color:red;">Sin stock</p>
<button disabled>Agotado</button>
</div>

<div class="product">
<p>Arena 2</p>
<button onclick="addToCart('Arena 2',10, this)">Agregar</button>
</div>

<div class="product">
<p>Arena 3</p>
<button onclick="addToCart('Arena 3',12, this)">Agregar</button>
</div>

<br>
<button onclick="closeCatalog()">Cerrar</button>

</div>
</div>

<!-- CARRITO -->
<div class="popup" id="cartPopup">
<div class="popup-content">

<h3>🛒 Carrito</h3>

<div id="cartItems"></div>

<p>Total: $<span id="total">0</span></p>

<input type="text" id="coupon" placeholder="Cupón">
<button onclick="applyCoupon()">Aplicar</button>

<br><br>
<button onclick="closeCart()">Cerrar</button>

</div>
</div>

<script>

let cart=[]
let total=0
let discount=0

function openCatalog(){
document.getElementById("catalogPopup").style.display="flex"
}

function closeCatalog(){
document.getElementById("catalogPopup").style.display="none"
}

function openCart(){
document.getElementById("cartPopup").style.display="flex"
updateCart()
}

function closeCart(){
document.getElementById("cartPopup").style.display="none"
}

function addToCart(name,price,btn){
cart.push({name,price})
updateCart()
updateCounter()
animarVuelo(btn)

alert(name+" agregado ✨")
}

function updateCounter(){
document.getElementById("cartCount").innerText=cart.length
}

function updateCart(){
const container=document.getElementById("cartItems")
container.innerHTML=""

total=0

cart.forEach((item,index)=>{
total+=item.price

const div=document.createElement("div")
div.innerHTML=`
${item.name} - $${item.price}
<button onclick="removeItem(${index})">❌</button>
`
container.appendChild(div)
})

let finalTotal=total-(total*discount)
document.getElementById("total").innerText=finalTotal.toFixed(2)
}

function removeItem(index){
cart.splice(index,1)
updateCart()
updateCounter()
}

function applyCoupon(){
const code=document.getElementById("coupon").value

if(code==="MAGIA10"){
discount=0.10
alert("Cupón aplicado ✨")
lanzarConfetti()
}else{
discount=0
alert("Cupón inválido")
}

updateCart()
}

/* CONFETTI */
function lanzarConfetti(){
for(let i=0;i<60;i++){
let confetti=document.createElement("div")
confetti.classList.add("confetti")

confetti.style.left=Math.random()*100+"%"
confetti.style.background=`hsl(${Math.random()*360},100%,60%)`
confetti.style.animationDuration=(Math.random()*2+1)+"s"

document.body.appendChild(confetti)

setTimeout(()=>{confetti.remove()},2000)
}
}

/* ANIMACIÓN VUELO */
function animarVuelo(btn){
const rect=btn.getBoundingClientRect()
const cartBtn=document.getElementById("cartBtn").getBoundingClientRect()

const dot=document.createElement("div")
dot.classList.add("fly")

dot.style.left=rect.left+"px"
dot.style.top=rect.top+"px"

document.body.appendChild(dot)

setTimeout(()=>{
dot.style.left=cartBtn.left+"px"
dot.style.top=cartBtn.top+"px"
dot.style.opacity=0
},50)

setTimeout(()=>{dot.remove()},800)
}

</script>

</body>
</html>
