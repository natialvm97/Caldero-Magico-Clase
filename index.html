<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caldero Mágico | Candelas Fantásticas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

.moon-btn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}

.cart-btn{
position:fixed;
top:20px;
right:95px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
font-family:'Playfair Display',serif;
}

.hero{
background-color:rgba(255,255,255,0.88);
padding:60px 80px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
max-width:900px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:64px;
color:#b85c7a;
}

.banner{
width:100%;
max-width:1100px;
display:block;
margin:40px auto;
border-radius:16px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#fff;
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
}

</style>
</head>

<body>

<button class="cart-btn" onclick="openCart()">🛒</button>

<section class="hero">

<h1>El Caldero Mágico</h1>

<button onclick="window.location.href='hechizos.html'">
Explorar hechizos
</button>

</section>

<!-- 🛒 CARRITO -->
<div class="popup" id="cartPopup">
<div class="popup-content">

<h3>Carrito de compras 🛒</h3>

<div id="cartItems"></div>

<div>
Total: $<span id="cartTotal">0</span>
</div>

<label>Cupón</label>
<input type="text" id="coupon">

<button onclick="applyCoupon()">Aplicar cupón</button>

<button onclick="closeCart()">Cerrar</button>

</div>
</div>

<script>

/* ⭐ ESTRELLAS (sin cambios) */

function crearEstrellas(){
const contenedor=document.getElementById("stars");
if(!contenedor)return;
contenedor.innerHTML="";
for(let i=0;i<80;i++){
let estrella=document.createElement("div");
estrella.classList.add("star");
estrella.style.top=Math.random()*100+"%";
estrella.style.left=Math.random()*100+"%";
contenedor.appendChild(estrella);
}
}

/* 🛒 CARRITO GLOBAL */

let carrito =
JSON.parse(localStorage.getItem("carrito")) || [];

let descuento=0;

function agregarAlCarrito(nombre,precio){
carrito.push({nombre,precio});
localStorage.setItem("carrito",JSON.stringify(carrito));
renderCarrito();
}

function renderCarrito(){

let cont=document.getElementById("cartItems");
cont.innerHTML="";

let total=0;

carrito.forEach((item,i)=>{
total+=item.precio;

cont.innerHTML+=`
<div>
${item.nombre} - $${item.precio}
<button onclick="eliminar(${i})">❌</button>
</div>`;
});

let final=total-(total*descuento);
document.getElementById("cartTotal").innerText=final.toFixed(2);
}

function eliminar(i){
carrito.splice(i,1);
localStorage.setItem("carrito",JSON.stringify(carrito));
renderCarrito();
}

function applyCoupon(){
let c=document.getElementById("coupon").value;
descuento=(c==="MAGIA10")?0.10:0;
alert(descuento?"Cupón aplicado ✨":"Cupón inválido");
renderCarrito();
}

function openCart(){
renderCarrito();
document.getElementById("cartPopup").style.display="flex";
}

function closeCart(){
document.getElementById("cartPopup").style.display="none";
}

/* cargar carrito automáticamente */
renderCarrito();

</script>

</body>
</html>
