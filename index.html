<head>

<style>

/* (TODO TU CSS SE MANTIENE EXACTAMENTE IGUAL) */

</head>

<body>

<div class="stars" id="stars"></div>

<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="openCart()">🛒</button>

<section class="hero">

<h1>El Caldero Mágico</h1>
<h2>Candelas fantásticas, naturales y no tóxicas</h2>

<p>
Cada candela es una poción de luz: aromas encantados, ceras vegetales
y un brillo que transforma tu espacio en un refugio mágico.
</p>

<img src="banner 1 v2.png" class="banner">

<div class="gallery">
<img src="photo-1720671847847-0b127f440aa3.avif">
<img src="photo-1720788810349-7e51a042404a.avif">
<img src="photo-1596433809252-260c2745dfdd.avif">
<img src="photo-1603218678692-3967d7523bb0.avif">
</div>

<div class="buttons">
<button onclick="window.location.href='hechizos.html'">Explorar hechizos</button>
<button onclick="openPopup()">Contactar por correo</button>
<button onclick="openPayment()">Pagos</button>
</div>

<img src="2.png" class="banner">

</section>

<!-- ================= CARRITO ================= -->

<div class="popup" id="cartPopup">
<div class="popup-content">

<h3>Carrito de compras 🛒</h3>

<div id="cartItems"></div>

<div class="cart-total">
Total: $<span id="cartTotal">0</span>
</div>

<label>Cupón</label>
<input type="text" id="coupon">

<button onclick="applyCoupon()">Aplicar cupón</button>

<div class="popup-actions">
<button onclick="closeCart()">Cerrar</button>
</div>

</div>
</div>

<script>

/* ⭐ ESTRELLAS (sin cambios) */
function crearEstrellas(){
const contenedor=document.getElementById("stars");
contenedor.innerHTML="";
for(let i=0;i<80;i++){
let estrella=document.createElement("div");
estrella.classList.add("star");
estrella.style.top=Math.random()*100+"%";
estrella.style.left=Math.random()*100+"%";
contenedor.appendChild(estrella);
}
}

/* ================= CARRITO CONECTADO ================= */

let carrito = JSON.parse(localStorage.getItem("carrito")) || []
let descuento=0

function agregarAlCarrito(nombre,precio){
carrito.push({nombre,precio})
localStorage.setItem("carrito",JSON.stringify(carrito))
renderCarrito()
}

function renderCarrito(){
let cont=document.getElementById("cartItems")
cont.innerHTML=""
let total=0

carrito.forEach((item,i)=>{
total+=item.precio
cont.innerHTML+=`
<div class="cart-item">
${item.nombre} - $${item.precio}
<button onclick="eliminar(${i})">❌</button>
</div>`
})

let final=total-(total*descuento)
document.getElementById("cartTotal").innerText=final.toFixed(2)
}

function eliminar(i){
carrito.splice(i,1)
localStorage.setItem("carrito",JSON.stringify(carrito))
renderCarrito()
}

function applyCoupon(){
let c=document.getElementById("coupon").value
descuento = (c==="MAGIA10") ? 0.10 : 0
alert(descuento ? "Cupón aplicado ✨" : "Cupón inválido")
renderCarrito()
}

function openCart(){
renderCarrito()
document.getElementById("cartPopup").style.display="flex"
}

function closeCart(){
document.getElementById("cartPopup").style.display="none"
}

/* cargar carrito al entrar */
renderCarrito()

</script>

</body>
</html>
