<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caldero Mágico | Candelas Fantásticas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:linear-gradient(135deg,#f7c6d9,#cde8d6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

.moon-btn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
}

/* 🛒 NUEVO */
.cart-btn{
position:fixed;
top:20px;
right:95px;
font-size:22px;
background:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:1000;
font-family:'Playfair Display',serif;
}

.hero{
background-color:rgba(255,255,255,0.88);
padding:60px 80px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
max-width:900px;
transition:0.5s;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:64px;
color:#b85c7a;
margin-bottom:10px;
}

.hero h2{
font-size:24px;
font-style:italic;
color:#6fa58c;
margin-bottom:30px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:40px;
line-height:1.6;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:40px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

button{
background-color:#cde8d6;
color:#4f7f6a;
border:none;
padding:14px 40px;
font-size:18px;
border-radius:30px;
cursor:pointer;
font-family:'Playfair Display',serif;
transition:all .3s ease;
}

button:hover{
background-color:#f7c6d9;
color:#9c4f6a;
}

.banner{
width:100%;
max-width:1100px;
display:block;
margin:40px auto;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#fff;
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
text-align:left;
}

.popup-content h3{
text-align:center;
color:#b85c7a;
margin-bottom:20px;
}

.popup-content label{
display:block;
margin-top:10px;
font-size:14px;
}

.popup-content input,
.popup-content textarea,
.popup-content select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
font-family:inherit;
}

.popup-actions{
display:flex;
justify-content:space-between;
margin-top:20px;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<button class="moon-btn" onclick="temaOscuro()">🌙</button>
<button class="cart-btn" onclick="openCart()">🛒</button>

<section class="hero">

<h1>El Caldero Mágico</h1>
<h2>Candelas fantásticas, naturales y no tóxicas</h2>

<p>
Cada candela es una poción de luz: aromas encantados, ceras vegetales
y un brillo que transforma tu espacio en un refugio mágico.
</p>

<img src="banner 1 v2.png" class="banner">

<div class="gallery">
<img src="photo-1720671847847-0b127f440aa3.avif">
<img src="photo-1720788810349-7e51a042404a.avif">
<img src="photo-1596433809252-260c2745dfdd.avif">
<img src="photo-1603218678692-3967d7523bb0.avif">
</div>

<div class="buttons">
<button onclick="window.location.href='hechizos.html'">Explorar hechizos</button>
<button onclick="openPopup()">Contactar por correo</button>
<button onclick="openPayment()">Pagos</button>
</div>

<img src="2.png" class="banner">

</section>

<!-- 🛒 CARRITO -->
<div class="popup" id="cartPopup">
<div class="popup-content">
<h3>Carrito de compras 🛒</h3>

<div id="cartItems"></div>

<div class="cart-total">
Total: $<span id="cartTotal">0</span>
</div>

<label>Cupón</label>
<input type="text" id="coupon">

<button onclick="applyCoupon()">Aplicar cupón</button>

<div class="popup-actions">
<button onclick="closeCart()">Cerrar</button>
</div>
</div>
</div>

<!-- CONTACTO ORIGINAL -->
<div class="popup" id="popup">
<div class="popup-content">
<h3>Contacto mágico ✨</h3>

<form id="contactForm">
<label>Fecha</label>
<input type="text" id="date" readonly>

<label>Correo electrónico</label>
<input type="email" id="email" required>

<label>Mensaje</label>
<textarea id="message" required></textarea>

<div class="popup-actions">
<button type="submit">Enviar</button>
<button type="button" onclick="closePopup()">Cerrar</button>
</div>
</form>
</div>
</div>

<!-- PAGOS ORIGINAL -->
<div class="popup" id="paymentPopup">
<div class="popup-content">
<h3>Pago Seguro ✨</h3>

<form id="paymentForm">

<label>Nombre completo</label>
<input type="text" id="fullName" required>

<label>Cédula / ID</label>
<input type="text" id="idNumber" required>

<label>Correo electrónico</label>
<input type="email" id="payEmail" required>

<label>Tipo de artículo</label>
<input type="text" id="itemType" required>

<label>Método de pago</label>
<select id="paymentMethod" required>
<option value="">Seleccione</option>
<option>Tarjeta</option>
<option>Sinpe</option>
<option>Transferencia</option>
</select>

<label>Monto ($)</label>
<input type="number" id="amount" required>

<div class="popup-actions">
<button type="submit">Confirmar Compra</button>
<button type="button" onclick="closePayment()">Cerrar</button>
</div>

</form>
</div>
</div>


<script>

/* ⭐ ESTRELLAS */
function crearEstrellas(){
const contenedor=document.getElementById("stars");
contenedor.innerHTML="";
for(let i=0;i<80;i++){
let estrella=document.createElement("div");
estrella.classList.add("star");
estrella.style.top=Math.random()*100+"%";
estrella.style.left=Math.random()*100+"%";
estrella.style.animationDelay=Math.random()*2+"s";
contenedor.appendChild(estrella);
}
}

function temaOscuro(){
document.body.classList.toggle("dark-mode");
if(document.body.classList.contains("dark-mode")){
crearEstrellas();
}
}

/* POPUPS ORIGINALES */
function openPopup(){
document.getElementById('popup').style.display='flex'
document.getElementById('date').value=new Date().toLocaleDateString()
}

function closePopup(){
document.getElementById('popup').style.display='none'
}

function openPayment(){
document.getElementById('paymentPopup').style.display='flex'
}

function closePayment(){
document.getElementById('paymentPopup').style.display='none'
}


/* 🛒 CARRITO */
let carrito=[]
let descuento=0

function agregarAlCarrito(nombre,precio){
carrito.push({nombre,precio})
renderCarrito()
}

function renderCarrito(){
let cont=document.getElementById("cartItems")
cont.innerHTML=""
let total=0

carrito.forEach((item,i)=>{
total+=item.precio
cont.innerHTML+=`
<div class="cart-item">
${item.nombre} - $${item.precio}
<button onclick="eliminar(${i})">❌</button>
</div>`
})

let final=total-(total*descuento)
document.getElementById("cartTotal").innerText=final.toFixed(2)
}

function eliminar(i){
carrito.splice(i,1)
renderCarrito()
}

function applyCoupon(){
let c=document.getElementById("coupon").value
descuento = (c==="MAGIA10") ? 0.10 : 0
alert(descuento ? "Cupón aplicado ✨" : "Cupón inválido")
renderCarrito()
}

function openCart(){document.getElementById("cartPopup").style.display="flex"}
function closeCart(){document.getElementById("cartPopup").style.display="none"}

/* FORMULARIOS ORIGINALES */
document.getElementById('contactForm').addEventListener('submit',function(e){
e.preventDefault()
alert('Mensaje guardado localmente ✨')
this.reset()
closePopup()
})

document.getElementById('paymentForm').addEventListener('submit',function(e){

e.preventDefault()

const name=document.getElementById('fullName').value
const id=document.getElementById('idNumber').value
const email=document.getElementById('payEmail').value
const item=document.getElementById('itemType').value
const method=document.getElementById('paymentMethod').value
const amount=document.getElementById('amount').value

if(!name||!id||!email||!item||!method||!amount){
alert("Debe completar todos los campos ✨")
return
}

const now=new Date()
const date=now.toLocaleDateString()
const time=now.toLocaleTimeString()

const invoice=`
FACTURA OFICIAL
Empresa: El Caldero Mágico
Fecha: ${date}
Hora: ${time}

Cliente: ${name}
ID: ${id}
Correo: ${email}

Artículo: ${item}
Medio de Pago: ${method}
Monto: $${amount}

Garantía: 30 días
Gracias por su compra ✨
`

const blob=new Blob([invoice],{type:"text/plain"})
const link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="Factura_El_Caldero_Magico.txt"
link.click()

alert("Compra realizada con éxito ✨ Factura generada.")

this.reset()
closePayment()

})

</script>

</body>
</html>
